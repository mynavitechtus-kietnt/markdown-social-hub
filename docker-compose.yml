# docker-compose.yml

services:
  db:
    image: postgres:15-alpine
    container_name: social_hub_postgres
    environment:
      # Root/Superuser tạo DB ban đầu
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_ROOT_USER}
      POSTGRES_PASSWORD: ${DB_ROOT_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Script khởi tạo app user & permissions
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - social_hub_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_ROOT_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: social_hub_app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    networks:
      - social_hub_network

volumes:
  postgres_data:
  media_data:

networks:
  social_hub_network:
    driver: bridge
